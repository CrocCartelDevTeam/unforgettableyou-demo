# Netlify deployment blueprint.
# This is a static site (no build step). Drag-and-drop the folder onto
# https://app.netlify.com/drop  OR connect this repo in the Netlify UI and
# these settings are applied automatically.

[build]
  publish = "."
  command = ""

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
